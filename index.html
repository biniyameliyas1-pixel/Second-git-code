<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple church counting form with Ethiopian Orthodox style and palm tree pattern.">
  <title>Church Counting Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="church-header">
      <div class="church-badge" aria-hidden="true">
        <svg viewBox="0 0 64 64" role="img" aria-label="Cross emblem">
          <rect x="28" y="8" width="8" height="48" rx="3"></rect>
          <rect x="12" y="24" width="40" height="8" rx="3"></rect>
        </svg>
      </div>
      <p class="church-tag">Ethiopian Orthodox Church</p>
      <h1>Church Counting Form</h1>
      <p class="church-subtitle">Simple service attendance and offering record</p>
      <p class="church-verse">“With order, reverence, and thanksgiving.”</p>
    </header>

    <main class="form-wrapper">
      <section class="palm-banner" aria-hidden="true">
        <svg viewBox="0 0 600 180" role="img" aria-label="Palm tree pattern">
          <rect width="600" height="180" fill="none"></rect>
          <path d="M80 150 C95 95, 110 70, 128 40" stroke="#4f6b3d" stroke-width="6" fill="none" stroke-linecap="round"></path>
          <path d="M88 150 C105 110, 122 95, 142 67" stroke="#5e7b44" stroke-width="5" fill="none" stroke-linecap="round"></path>
          <path d="M90 150 C110 125, 118 110, 132 92" stroke="#6e9052" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <rect x="108" y="140" width="10" height="28" rx="3" fill="#6f4423"></rect>
          <path d="M480 150 C495 95, 510 70, 528 40" stroke="#4f6b3d" stroke-width="6" fill="none" stroke-linecap="round"></path>
          <path d="M488 150 C505 110, 522 95, 542 67" stroke="#5e7b44" stroke-width="5" fill="none" stroke-linecap="round"></path>
          <path d="M490 150 C510 125, 518 110, 532 92" stroke="#6e9052" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <rect x="508" y="140" width="10" height="28" rx="3" fill="#6f4423"></rect>
          <path d="M250 150 C265 110, 275 90, 286 60" stroke="#4f6b3d" stroke-width="6" fill="none" stroke-linecap="round"></path>
          <path d="M260 150 C275 125, 288 105, 304 76" stroke="#5e7b44" stroke-width="5" fill="none" stroke-linecap="round"></path>
          <path d="M268 150 C282 135, 292 118, 300 100" stroke="#6e9052" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <rect x="280" y="140" width="10" height="28" rx="3" fill="#6f4423"></rect>
        </svg>
      </section>

      <section class="form-card">
        <div class="stamp" aria-hidden="true">✝</div>
        <form class="counting-form">
          <div class="form-row">
            <label>
              Church Name
              <input type="text" name="church-name" placeholder="St. Mary Church" required>
            </label>
            <label>
              Date
              <input type="date" name="service-date" required>
            </label>
          </div>

          <div class="form-row">
            <label>
              Service Type
              <select name="service-type">
                <option>Sunday Service</option>
                <option>Midweek Prayer</option>
                <option>Feast Day</option>
                <option>Special Liturgy</option>
                <option>Wedding / Baptism</option>
              </select>
            </label>
            <label>
              Priest / Leader
              <input type="text" name="leader" placeholder="Abba ..." required>
            </label>
          </div>

          <div class="form-row">
            <label>
              Service Start
              <input type="time" name="start-time">
            </label>
            <label>
              Service End
              <input type="time" name="end-time">
            </label>
          </div>

          <div class="form-row">
            <label>
              Choir / Cantor
              <input type="text" name="choir" placeholder="Choir name or leader">
            </label>
            <label>
              Bible Reading
              <input type="text" name="bible-reading" placeholder="Book, chapter, verse">
            </label>
          </div>

          <div class="stats-grid">
            <label>
              Men
              <input type="number" name="men" min="0" value="0">
            </label>
            <label>
              Women
              <input type="number" name="women" min="0" value="0">
            </label>
            <label>
              Youth
              <input type="number" name="youth" min="0" value="0">
            </label>
            <label>
              Children
              <input type="number" name="children" min="0" value="0">
            </label>
          </div>

          <div class="stats-grid">
            <label>
              Visitors
              <input type="number" name="visitors" min="0" value="0">
            </label>
            <label>
              Couples
              <input type="number" name="couples" min="0" value="0">
            </label>
            <label>
              Communion
              <input type="number" name="communion" min="0" value="0">
            </label>
            <label>
              Sunday School
              <input type="number" name="sunday-school" min="0" value="0">
            </label>
          </div>

          <div class="form-row">
            <label>
              Regular Offering (Birr)
              <input type="number" name="regular-offering" min="0" value="0">
            </label>
            <label>
              Special Offering (Birr)
              <input type="number" name="special-offering" min="0" value="0">
            </label>
          </div>

          <div class="form-row">
            <label>
              Tithe Collection (Birr)
              <input type="number" name="tithe" id="tithe" min="0" value="0">
            </label>
            <label>
              Total Attendance
              <input type="number" name="total" id="total-attendance" min="0" value="0" readonly>
            </label>
          </div>

          <section class="summary-panel" aria-label="Service summary details">
            <h2>Service Summary</h2>
            <div class="summary-grid">
              <div class="summary-card">
                <span>Attendance Total</span>
                <strong id="summary-attendance">0</strong>
              </div>
              <div class="summary-card">
                <span>Collected Offering</span>
                <strong id="summary-offering">0</strong>
              </div>
              <div class="summary-card">
                <span>Total Giving</span>
                <strong id="summary-giving">0</strong>
              </div>
              <div class="summary-card">
                <span>Communion Participants</span>
                <strong id="summary-communion">0</strong>
              </div>
            </div>
          </section>

          <label class="full-width">
            Service Notes
            <textarea name="notes" rows="4" placeholder="Special prayers, hospital visits, or follow-up details..."></textarea>
          </label>

          <label class="full-width">
            Actions & Reminders
            <textarea name="actions" rows="3" placeholder="Next steps, announcements, or ministry reminders..."></textarea>
          </label>

          <div class="actions">
            <button type="submit">Save Record</button>
            <button type="button" class="secondary print-btn">Print Record</button>
            <button type="reset" class="secondary">Clear Form</button>
          </div>
        </form>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
