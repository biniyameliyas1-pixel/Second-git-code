<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple church counting form with Ethiopian Orthodox style and palm tree pattern.">
  <title>Church Counting Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="church-header">
      <div class="lang-switcher">
        <button type="button" class="lang-btn active" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="am">AM</button>
      </div>
      <div class="church-badge" aria-hidden="true">
        <svg viewBox="0 0 64 64" role="img" aria-label="Cross emblem">
          <rect x="28" y="8" width="8" height="48" rx="3"></rect>
          <rect x="12" y="24" width="40" height="8" rx="3"></rect>
        </svg>
      </div>
      <p class="church-tag" data-en="Ethiopian Orthodox Church" data-am="የኢትዮጵያ ኦርቶዶክስ ቤ/ክርስቲያን">Ethiopian Orthodox Church</p>
      <h1 data-en="Church Counting Form" data-am="የቤ/ክርስቲያን መቆጣጠሪያ ቅጽ">Church Counting Form</h1>
      <p class="church-subtitle" data-en="Simple service attendance and offering record" data-am="ቀላል የአገልግሎት ተሳታፊ እና ልገሳ መዝገብ">Simple service attendance and offering record</p>
      <p class="church-verse" data-en="“With order, reverence, and thanksgiving.”" data-am="“በቅደም ተከተል፣ በአክብሮት እና በምስጋና”">“With order, reverence, and thanksgiving.”</p>
    </header>

    <main class="form-wrapper">
      <section class="palm-banner" aria-hidden="true">
        <svg viewBox="0 0 600 180" role="img" aria-label="Palm tree pattern">
          <rect width="600" height="180" fill="none"></rect>
          <path d="M80 150 C95 95, 110 70, 128 40" stroke="#4f6b3d" stroke-width="6" fill="none" stroke-linecap="round"></path>
          <path d="M88 150 C105 110, 122 95, 142 67" stroke="#5e7b44" stroke-width="5" fill="none" stroke-linecap="round"></path>
          <path d="M90 150 C110 125, 118 110, 132 92" stroke="#6e9052" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <rect x="108" y="140" width="10" height="28" rx="3" fill="#6f4423"></rect>
          <path d="M480 150 C495 95, 510 70, 528 40" stroke="#4f6b3d" stroke-width="6" fill="none" stroke-linecap="round"></path>
          <path d="M488 150 C505 110, 522 95, 542 67" stroke="#5e7b44" stroke-width="5" fill="none" stroke-linecap="round"></path>
          <path d="M490 150 C510 125, 518 110, 532 92" stroke="#6e9052" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <rect x="508" y="140" width="10" height="28" rx="3" fill="#6f4423"></rect>
          <path d="M250 150 C265 110, 275 90, 286 60" stroke="#4f6b3d" stroke-width="6" fill="none" stroke-linecap="round"></path>
          <path d="M260 150 C275 125, 288 105, 304 76" stroke="#5e7b44" stroke-width="5" fill="none" stroke-linecap="round"></path>
          <path d="M268 150 C282 135, 292 118, 300 100" stroke="#6e9052" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <rect x="280" y="140" width="10" height="28" rx="3" fill="#6f4423"></rect>
        </svg>
      </section>

      <section class="form-card">
        <div class="stamp" aria-hidden="true">✝</div>
        <form class="counting-form" action="https://formspree.io/f/xojowklz" method="POST">
          <input type="hidden" name="_subject" value="New Church Member Registration">
          <section class="form-section">
            <h2 data-en="Personal Information" data-am="የግል መረጃ">Personal Information</h2>
            <div class="form-row">
              <label>
                <span data-en="Full Name" data-am="ሙሉ ስም">Full Name</span>
                <input type="text" name="full-name" placeholder="Enter full name" required>
              </label>
              <label>
                <span data-en="Father's Name" data-am="የአባት ስም">Father's Name</span>
                <input type="text" name="father-name" placeholder="Father's name">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Grandfather's Name" data-am="የአያት ስም">Grandfather's Name</span>
                <input type="text" name="grandfather-name" placeholder="Grandfather's name">
              </label>
              <label>
                <span data-en="Gender" data-am="ፆታ">Gender</span>
                <select name="gender">
                  <option value="">Select</option>
                  <option>Male</option>
                  <option>Female</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Date of Birth" data-am="የትውልድ ቀን">Date of Birth</span>
                <input type="date" name="birth-date">
              </label>
              <label>
                <span data-en="Age" data-am="ዕድሜ">Age</span>
                <input type="number" name="age" min="0" placeholder="Auto-calculated">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Phone Number" data-am="ስልክ ቁጥር">Phone Number</span>
                <input type="tel" name="phone" placeholder="09xxxxxxxx">
              </label>
              <label>
                <span data-en="Email (Optional)" data-am="ኢሜል (በአማራጭ)">Email (Optional)</span>
                <input type="email" name="email" placeholder="name@example.com">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2 data-en="Church Information" data-am="የቤ/ክርስቲያን መረጃ">Church Information</h2>
            <div class="form-row">
              <label>
                <span data-en="Parish" data-am="ቤ/ክርስቲያን አካባቢ">Parish</span>
                <input type="text" name="parish" placeholder="Parish name">
              </label>
              <label>
                <span data-en="Church Name" data-am="የቤ/ክርስቲያን ስም">Church Name</span>
                <input type="text" name="church-name" placeholder="Church name">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Diocese" data-am="ዲዮሴስ">Diocese</span>
                <input type="text" name="diocese" placeholder="Diocese name">
              </label>
              <label>
                <span data-en="Baptized" data-am="መጠመቂያ የተደረገ">Baptized</span>
                <select name="baptized">
                  <option value="">Select</option>
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Baptism Date" data-am="የመጠመቂያ ቀን">Baptism Date</span>
                <input type="date" name="baptism-date">
              </label>
              <label>
                <span data-en="Confession Father" data-am="የምስጋና አባት">Confession Father</span>
                <input type="text" name="confession-father" placeholder="Name">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Holy Communion" data-am="መቅደስ ምግባር">Holy Communion</span>
                <select name="holy-communion">
                  <option value="">Select</option>
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </label>
              <label>
                <span data-en="Choir Member" data-am="የመዘምራን አባል">Choir Member</span>
                <select name="choir-member">
                  <option value="">Select</option>
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Sunday School" data-am="የእሑድ ት/ቤት">Sunday School</span>
                <select name="sunday-school">
                  <option value="">Select</option>
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </label>
              <label>
                <span data-en="Volunteer" data-am="በፈቃደኝነት አገልጋይ">Volunteer</span>
                <select name="volunteer">
                  <option value="">Select</option>
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2 data-en="Family Information" data-am="የቤተሰብ መረጃ">Family Information</h2>
            <div class="form-row">
              <label>
                <span data-en="Marital Status" data-am="የጋብቻ ሁኔታ">Marital Status</span>
                <select name="marital-status">
                  <option value="">Select</option>
                  <option>Single</option>
                  <option>Married</option>
                  <option>Widowed</option>
                  <option>Divorced</option>
                </select>
              </label>
              <label>
                <span data-en="Family Head Name" data-am="የቤተሰብ አለቃ ስም">Family Head Name</span>
                <input type="text" name="family-head" placeholder="Family head">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Number of Family Members" data-am="የቤተሰብ አባላት ብዛት">Number of Family Members</span>
                <input type="number" name="family-members" min="0" value="0">
              </label>
              <label>
                Children
                <input type="number" name="children" min="0" value="0">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Spouse Name" data-am="የባለቤት ስም">Spouse Name</span>
                <input type="text" name="spouse-name" placeholder="Spouse name">
              </label>
              <label>
                <span data-en="National ID (Optional)" data-am="ብሔራዊ መታወቂያ (በአማራጭ)">National ID (Optional)</span>
                <input type="text" name="national-id" placeholder="ID number">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2 data-en="Address Information" data-am="የአድራሻ መረጃ">Address Information</h2>
            <div class="form-row">
              <label>
                <span data-en="Region" data-am="ክልል">Region</span>
                <input type="text" name="region" placeholder="Region">
              </label>
              <label>
                <span data-en="Zone" data-am="ዞን">Zone</span>
                <input type="text" name="zone" placeholder="Zone">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Woreda" data-am="ወረዳ">Woreda</span>
                <input type="text" name="woreda" placeholder="Woreda">
              </label>
              <label>
                <span data-en="Kebele" data-am="ቀበሌ">Kebele</span>
                <input type="text" name="kebele" placeholder="Kebele">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Village" data-am="መንደር">Village</span>
                <input type="text" name="village" placeholder="Village">
              </label>
              <label>
                <span data-en="House Number" data-am="የቤት ቁጥር">House Number</span>
                <input type="text" name="house-number" placeholder="House number">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2 data-en="Occupation Information" data-am="የስራ መረጃ">Occupation Information</h2>
            <div class="form-row">
              <label>
                <span data-en="Occupation" data-am="ስራ">Occupation</span>
                <input type="text" name="occupation" placeholder="Job title">
              </label>
              <label>
                <span data-en="Employer" data-am="አሰሪ">Employer</span>
                <input type="text" name="employer" placeholder="Employer name">
              </label>
            </div>
            <div class="form-row">
              <label>
                <span data-en="Education Level" data-am="የትምህርት ደረጃ">Education Level</span>
                <input type="text" name="education-level" placeholder="Education level">
              </label>
              <label>
                <span data-en="Special Skills" data-am="ልዩ ክህሎቶች">Special Skills</span>
                <input type="text" name="skills" placeholder="Skills">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2 data-en="Service Participation" data-am="የአገልግሎት ተሳትፎ">Service Participation</h2>
            <div class="checkbox-grid">
              <label><input type="checkbox" name="service-choir"> <span data-en="Choir" data-am="መዘምራን">Choir</span></label>
              <label><input type="checkbox" name="service-youth"> <span data-en="Youth Association" data-am="ወጣቶች ማህበር">Youth Association</span></label>
              <label><input type="checkbox" name="service-sunday-teacher"> <span data-en="Sunday School Teacher" data-am="የእሑድ ት/ቤት መምህር">Sunday School Teacher</span></label>
              <label><input type="checkbox" name="service-deacon"> <span data-en="Deacon" data-am="ዲያቆን">Deacon</span></label>
              <label><input type="checkbox" name="service-priest"> <span data-en="Priest" data-am="ካህን">Priest</span></label>
              <label><input type="checkbox" name="service-volunteer"> <span data-en="Volunteer" data-am="በፈቃደኝነት አገልጋይ">Volunteer</span></label>
              <label><input type="checkbox" name="service-charity"> <span data-en="Charity Committee" data-am="የበጎ አድራጎት ኮሚቴ">Charity Committee</span></label>
              <label><input type="checkbox" name="service-women"> <span data-en="Women's Association" data-am="የሴቶች ማህበር">Women's Association</span></label>
              <label><input type="checkbox" name="service-men"> <span data-en="Men's Association" data-am="የወንዶች ማህበር">Men's Association</span></label>
            </div>
          </section>

          <section class="form-section">
            <h2 data-en="Additional Information" data-am="ተጨማሪ መረጃ">Additional Information</h2>
            <label class="full-width">
              <span data-en="Health Notes (Optional)" data-am="የጤና ማስታወሻዎች (በአማራጭ)">Health Notes (Optional)</span>
              <textarea name="health-notes" rows="3" placeholder="Any important health note"></textarea>
            </label>
            <label class="full-width">
              <span data-en="Comments" data-am="አስተያየቶች">Comments</span>
              <textarea name="comments" rows="3" placeholder="Add comments or remarks"></textarea>
            </label>
          </section>

          <div class="actions">
            <button type="submit" data-en="Save Member" data-am="አባል ይመዝግቡ">Save Member</button>
            <button type="button" class="secondary print-btn" data-en="Print Form" data-am="ቅጽ አትም">Print Form</button>
            <button type="reset" class="secondary" data-en="Clear Form" data-am="ቅጽ አጽዳ">Clear Form</button>
          </div>
          <p class="form-message" id="form-message" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
